<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="./css/style.css" rel="stylesheet" type="text/css" />
    <title>Chat Box</title>
    <script src="./dist/authcheck.js" type="module"></script>
  </head>
  <body class="bg-light">
    
    <div class="container my-4 shadow-lg rounded-4 chat-containers">

        <!-- sidebar -->
        <aside class="text-white d-flex flex-column justify-content-between p-3 chat-sidebars">

            <div class="">
                <h4 class="text-center mb-4">Chat Rooms</h4>
                <div id="roomList"></div>

                <!-- create room -->
                <div class="create-room-section mt-3">
                    <form class="new-roomform" id="newRoomForm">
                        <div class="input-group input-group-sm">
                            <input type="text" id="newRoomName" class="form-control" placeholder="New room name..." required />
                            <button type="submit" class="btn create-room-btn" title="Create Room"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </form>
                </div>

                <!-- online users -->
                <div class="online-users-section mt-3">
                    <div class="online-users-header"><i class="fa-solid fa-circle" style="color:#26de81;font-size:8px"></i> Online <span id="onlineCount" class="online-count">0</span></div>
                    <div class="online-users-list" id="onlineUsersList"></div>
                </div>
            </div>

            <!-- update name -->
            <form class="new-nameform">
                <div class="small text-success text-center mb-2 update-msg"></div>
                <div class="input-group">
                    <input type="text" name="name" id="name" class="form-control" placeholder="Update your name..." required />
                    <button type="submit" class="btn update-btns"><i class="fa-solid fa-user-pen"></i></button>
                </div>
            </form>

        </aside>


        <!-- chatbox main area -->
        <main class="chat-mains d-flex flex-column flex-grow-1">

            <!-- header -->
            <header class="border-bottom d-flex justify-content-between align-items-center p-3 chat-headers">
                <h4 class="m-0"><i class="fa-solid fa-message"></i> Chat Box - <span id="roomtitle">general</span></h4>

                <div class="d-flex align-items-center gap-2">
                    <!-- search -->
                    <div class="search-box" id="searchBox">
                        <button type="button" class="btn btn-sm search-toggle-btn" id="searchToggleBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <input type="text" class="form-control form-control-sm search-input" id="searchInput" placeholder="Search messages..." style="display:none;" />
                    </div>

                    <!-- profile button dropdown -->
                     <div class="dropdown">
                        <button type="button" class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-user-circle me-2"></i>
                            <span id="profilename">Guest</span>
                        </button>
                        <ul class="dropdown-menu">
                            <li><a href="./profile.html" class="dropdown-item"><i class="fa-solid fa-id-badge me-2"></i>View Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button type="button" id="themeToggleBtn" class="dropdown-item"><i class="fa-solid fa-moon me-2"></i>Dark Mode</button></li>
                            <li><button type="button" id="soundToggleBtn" class="dropdown-item"><i class="fa-solid fa-volume-high me-2"></i>Sound: ON</button></li>
                        </ul>
                     </div>
                </div>
            </header>


            <!-- pinned messages bar -->
            <div class="pinned-bar" id="pinnedBar" style="display:none;">
                <div class="pinned-bar-header">
                    <i class="fa-solid fa-thumbtack"></i> <span id="pinnedCount">0</span> Pinned
                    <button type="button" class="btn btn-sm pinned-toggle-btn" id="pinnedToggleBtn"><i class="fa-solid fa-chevron-down"></i></button>
                </div>
                <div class="pinned-messages-list" id="pinnedMessagesList" style="display:none;"></div>
            </div>


            <!-- chat message -->
            <div class="flex-grow-1 overflow-auto p-3 chat-contents">
                <ul class="list-group chat-lists">
                    <!-- <li class="list-group-item">
                        <span class="username">Bo Bo</span>
                        <span class="message">How are your</span>
                        <div class="time">15 mins ago</div>
                    </li> -->
                </ul>
            </div>


            <!-- reaction picker popup -->
            <div class="reaction-picker" id="reactionPicker" style="display:none;">
                <span class="reaction-option" data-emoji="👍">👍</span>
                <span class="reaction-option" data-emoji="❤️">❤️</span>
                <span class="reaction-option" data-emoji="😂">😂</span>
                <span class="reaction-option" data-emoji="😮">😮</span>
                <span class="reaction-option" data-emoji="😢">😢</span>
                <span class="reaction-option" data-emoji="🔥">🔥</span>
                <span class="reaction-option" data-emoji="🎉">🎉</span>
                <span class="reaction-option" data-emoji="💯">💯</span>
            </div>

            <!-- reply preview bar -->
            <div class="reply-bar" id="replyBar" style="display:none;">
                <div class="reply-bar-content">
                    <i class="fa-solid fa-reply"></i>
                    <span id="replyPreviewText"></span>
                </div>
                <button type="button" class="btn btn-sm reply-cancel-btn" id="replyCancelBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <!-- mention suggestions -->
            <div class="mention-popup" id="mentionPopup" style="display:none;"></div>

            <!-- typing indicator -->
            <div class="typing-indicator" style="display:none;"></div>

            <!-- message input -->
            <form class="border-top p-3 new-chatform">
                <div class="input-group">
                    <input type="text" id="message" class="form-control" placeholder="Type your message..." required />
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" />
                    <button type="button" id="fileUploadBtn" class="btn file-upload-btn" title="Send Image"><i class="fa-solid fa-image"></i></button>
                    <button type="button" id="emojiToggleBtn" class="btn emoji-toggle-btn"><i class="fa-solid fa-face-smile"></i></button>
                    <button type="submit" class="btn send-btns"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <!-- emoji picker -->
                <div class="emoji-picker" id="emojiPicker" style="display:none;">
                    <div class="emoji-grid">
                        <span class="emoji-item">😀</span><span class="emoji-item">😂</span><span class="emoji-item">😍</span><span class="emoji-item">🥰</span>
                        <span class="emoji-item">😎</span><span class="emoji-item">🤔</span><span class="emoji-item">😢</span><span class="emoji-item">😭</span>
                        <span class="emoji-item">😡</span><span class="emoji-item">🤯</span><span class="emoji-item">😱</span><span class="emoji-item">🥳</span>
                        <span class="emoji-item">😴</span><span class="emoji-item">🤗</span><span class="emoji-item">😏</span><span class="emoji-item">🤩</span>
                        <span class="emoji-item">👍</span><span class="emoji-item">👎</span><span class="emoji-item">👏</span><span class="emoji-item">🙌</span>
                        <span class="emoji-item">💪</span><span class="emoji-item">🤝</span><span class="emoji-item">✌️</span><span class="emoji-item">👋</span>
                        <span class="emoji-item">❤️</span><span class="emoji-item">🔥</span><span class="emoji-item">⭐</span><span class="emoji-item">💯</span>
                        <span class="emoji-item">✅</span><span class="emoji-item">❌</span><span class="emoji-item">💡</span><span class="emoji-item">🎉</span>
                        <span class="emoji-item">🚀</span><span class="emoji-item">💻</span><span class="emoji-item">📱</span><span class="emoji-item">🎮</span>
                        <span class="emoji-item">🎵</span><span class="emoji-item">💬</span><span class="emoji-item">📌</span><span class="emoji-item">⚡</span>
                    </div>
                </div>
            </form>

        </main>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./dist/app.js" type="module"></script>
  </body>
</html>
